name: Agent task
description: A well-scoped task an AI agent can pick up and turn into a PR.
title: "[task]: "
labels: ["agent-ready"]
body:
  - type: markdown
    attributes:
      value: |
        The **`agent-ready`** label *queues* this for the agent. The dispatcher
        (`.github/workflows/dispatch-agent.yml`) picks up the next **unblocked**
        ready issue on a schedule — so if this must wait for other work, set
        **Depends on** below and it won't start until those issues are merged.
        The clearer the scope and acceptance criteria, the better the result.
        Link the relevant design/ and engineering/ docs.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should exist when this is done? One or two sentences.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Spec references
      description: Which design/ and engineering/ docs (and Parity Rulebook rows) govern this?
      placeholder: |
        - design/party-session.md §...
        - engineering/decisions/design-system.md → Parity Rulebook: ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist the PR must satisfy. Tests are mandatory for new computation.
      value: |
        - [ ] Behaviour matches the cited Parity Rulebook rules exactly
        - [ ] Unit tests added, expected values traced to design docs
        - [ ] `dart format` clean, `analyze` clean, all tests green (CI passes)
        - [ ] No Phase-2 scaffolding; `core` stays pure Dart
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Depends on
      description: >
        Issues that must be merged before this one can start. The dispatcher
        will not pick this up until they are all closed, which is how work is
        ordered. Either set GitHub's native relationship (issue sidebar →
        Relationships → "Mark as blocked by"), or list them here — the dispatcher
        reads both.
      placeholder: "Blocked by #12, #13"
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - core (computation)
        - persistence (Drift)
        - notifications
        - UI / design-system
        - charts
        - tooling / CI
        - other
    validations:
      required: true
