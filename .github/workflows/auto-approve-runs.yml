name: Auto-Approve Workflow Runs

# When the remediation bot pushes a fix commit, GitHub blocks the subsequent
# CI / review / security runs because the push actor is github-actions[bot].
# This workflow auto-approves those blocked runs, but ONLY when two conditions
# are both true:
#
#   1. The triggering actor is github-actions[bot] (the remediation GITHUB_TOKEN).
#      Any human push or claude[bot] PR-open already runs without approval.
#   2. The PR carries the `agent-remediation` label — proof that our remediation
#      workflow ran for this branch (only repo members can apply labels).
#
# NOTE: workflow_run always executes from the default branch regardless of which
# branch triggered it, so this workflow is never itself subject to the approval
# gate it is here to lift.

on:
  workflow_run:
    workflows: ["CI", "Claude PR Review", "Security Review"]
    types: [requested]

jobs:
  approve-run:
    # Fast-fail without API calls: actor must be the remediation bot on a
    # same-repo branch. Branch name is NOT checked here — the
    # agent-remediation label verified in the step below is the real gate.
    if: |
      github.event.workflow_run.actor.login == 'github-actions[bot]' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      RUN_ID: ${{ github.event.workflow_run.id }}
    steps:
      - name: Verify agent-remediation label
        id: guard
        run: |
          set -euo pipefail

          pr_number=$(gh pr list --repo "$REPO" --head "$HEAD_BRANCH" \
            --json number --jq '.[0].number // ""')
          if [ -z "$pr_number" ]; then
            echo "No open PR for branch $HEAD_BRANCH — skipping."
            echo "approve=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_label=$(gh pr view "$pr_number" --repo "$REPO" --json labels \
            --jq '[.labels[].name] | contains(["agent-remediation"]) | if . then "true" else "false" end')
          if [ "$has_label" != "true" ]; then
            echo "PR #$pr_number missing agent-remediation label — refusing auto-approve."
            echo "approve=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PR #$pr_number has agent-remediation label — approving run $RUN_ID."
          echo "approve=true" >> "$GITHUB_OUTPUT"

      - name: Approve blocked workflow run
        if: steps.guard.outputs.approve == 'true'
        run: |
          gh api "repos/$REPO/actions/runs/$RUN_ID/approve" -X POST
