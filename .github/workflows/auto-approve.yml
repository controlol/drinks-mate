name: Auto-Approve Agent PRs

# Automatically approves a claude/* PR once CI, code review, and security review
# all pass. Each of those workflows fires this on completion; whichever finishes
# last with all three checks green triggers the actual approval.
#
# Prerequisites (one-time setup):
#   Settings → Actions → General → "Allow GitHub Actions to create and approve
#   pull requests" must be enabled. Without it, the gh pr review --approve call
#   will be rejected by GitHub.
#
# NOTE: workflow_run only fires from the default branch, so this workflow takes
# effect only after it is merged to main.

on:
  workflow_run:
    workflows: ["CI", "Claude PR Review", "Security Review"]
    types: [completed]

jobs:
  approve:
    # Only run for same-repo claude/* branches. Fork PRs cannot reach this path.
    if: |
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'claude/')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Find PR
        id: pr
        run: |
          set -euo pipefail

          pr_number=$(gh pr list --repo "$REPO" --head "$HEAD_BRANCH" \
            --json number --jq '.[0].number // ""')
          if [ -z "$pr_number" ]; then
            echo "No open PR for branch $HEAD_BRANCH — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip if the bot already approved to avoid duplicate approvals.
          already=$(gh api "repos/$REPO/pulls/$pr_number/reviews" \
            --jq '[.[] | select(.state == "APPROVED" and .user.login == "github-actions[bot]")] | length')
          if [ "${already:-0}" -gt 0 ]; then
            echo "PR #$pr_number already has a bot approval — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr=$pr_number" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Check all three required workflows passed
        if: steps.pr.outputs.skip != 'true'
        id: checks
        run: |
          set -euo pipefail

          # Fetch the latest run of each required workflow at this commit SHA.
          # group_by(.name) + sort_by(.created_at) | last picks the most recent
          # run per workflow, so retries don't block the approval.
          results=$(gh api "repos/$REPO/actions/runs" \
            -f head_sha="$HEAD_SHA" \
            --jq '
              .workflow_runs
              | map(select(.name | IN("CI", "Claude PR Review", "Security Review")))
              | group_by(.name)
              | map(sort_by(.created_at) | last)
              | map({name: .name, status: .status, conclusion: .conclusion})')

          found=$(echo "$results" | jq 'length')
          not_green=$(echo "$results" | jq \
            '[.[] | select(.status != "completed" or .conclusion != "success")] | length')

          echo "Required workflows at $HEAD_SHA: found=$found/3, not-green=$not_green"
          echo "$results" | jq .

          if [ "$found" -lt 3 ] || [ "$not_green" -gt 0 ]; then
            echo "Not all required workflows completed successfully — not approving yet."
            echo "approve=false" >> "$GITHUB_OUTPUT"
          else
            echo "All three workflows passed — will approve."
            echo "approve=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve PR
        if: steps.pr.outputs.skip != 'true' && steps.checks.outputs.approve == 'true'
        run: |
          gh pr review "${{ steps.pr.outputs.pr }}" --repo "$REPO" \
            --approve \
            --body "CI, code review, and security checks all passed. Auto-approving this agent PR."
