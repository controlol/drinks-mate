name: Auto-Approve Agent PRs

# Automatically approves a claude/* PR once the CI workflow's four required
# jobs (core, app, review, security) all pass. CI runs review/security as
# jobs within itself (not separate workflows), so a single workflow_run
# completion of "CI" already reflects the outcome of all four.
#
# Prerequisites (one-time setup):
#   Settings → Actions → General → "Allow GitHub Actions to create and approve
#   pull requests" must be enabled. Without it, the gh pr review --approve call
#   will be rejected by GitHub.
#
# NOTE: workflow_run only fires from the default branch, so this workflow takes
# effect only after it is merged to main.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  approve:
    # Only run for same-repo PRs. The claude[bot] author check inside the step
    # is the real gate; the branch prefix here is a cheap pre-filter only.
    if: |
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'claude/')
    runs-on: ubuntu-latest
    permissions:
      actions: read      # needed to query workflow run results
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      RUN_ID: ${{ github.event.workflow_run.id }}
    steps:
      - name: Find PR
        id: pr
        run: |
          set -euo pipefail

          pr_number=$(gh pr list --repo "$REPO" --head "$HEAD_BRANCH" \
            --json number --jq '.[0].number // ""')
          if [ -z "$pr_number" ]; then
            echo "No open PR for branch $HEAD_BRANCH — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Only auto-approve PRs opened by the claude bot.
          # gh uses GraphQL which returns the app slug as "app/claude".
          pr_author=$(gh pr view "$pr_number" --repo "$REPO" \
            --json author --jq '.author.login')
          if [ "$pr_author" != "app/claude" ]; then
            echo "PR #$pr_number not authored by app/claude (got: $pr_author) — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip if the bot already approved to avoid duplicate approvals.
          already=$(gh api "repos/$REPO/pulls/$pr_number/reviews" \
            --jq '[.[] | select(.state == "APPROVED" and .user.login == "github-actions[bot]")] | length')
          if [ "${already:-0}" -gt 0 ]; then
            echo "PR #$pr_number already has a bot approval — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr=$pr_number" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Check all required CI jobs passed
        if: steps.pr.outputs.skip != 'true'
        id: checks
        run: |
          set -euo pipefail

          # This run (RUN_ID) is the exact CI run that just completed, so its
          # jobs already reflect the final state of core, app, review, and
          # security — no need to search across other runs at this SHA.
          results=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
            --jq '
              [.jobs[] | select(.name | IN("core package (pure Dart)", "flutter app", "review", "security"))]
              | map({name: .name, status: .status, conclusion: .conclusion})')

          found=$(echo "$results" | jq 'length')
          not_green=$(echo "$results" | jq \
            '[.[] | select(.status != "completed" or .conclusion != "success")] | length')

          echo "Required jobs in CI run $RUN_ID: found=$found/4, not-green=$not_green"
          echo "$results" | jq .

          if [ "$found" -lt 4 ] || [ "$not_green" -gt 0 ]; then
            echo "Not all required jobs completed successfully — not approving yet."
            echo "approve=false" >> "$GITHUB_OUTPUT"
          else
            echo "All four jobs passed — will approve."
            echo "approve=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve PR
        if: steps.pr.outputs.skip != 'true' && steps.checks.outputs.approve == 'true'
        run: |
          gh pr review "${{ steps.pr.outputs.pr }}" --repo "$REPO" \
            --approve \
            --body "CI, code review, and security checks all passed. Auto-approving this agent PR."
