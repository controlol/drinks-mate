name: CI

# Deterministic, non-AI quality gate. Runs first and fast on every push/PR.
# This is the definition-of-done agents (and humans) must satisfy before merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  core:
    name: core package (pure Dart)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter/packages/core
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Format check
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: dart analyze
      - name: Test (with coverage)
        run: dart test --coverage=coverage && dart pub global activate coverage && dart pub global run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib

  app:
    name: flutter app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Format check
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze
      - name: Test (with coverage)
        run: flutter test --coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: flutter-coverage
          path: flutter/coverage/lcov.info
          if-no-files-found: ignore

  # Integration tests (integration_test + Patrol) run on a nightly cron and on
  # PRs touching critical flows — wire this up once those tests exist.
  # See engineering/decisions/flutter-stack.md (D4) and docs/agentic-workflow.md.
