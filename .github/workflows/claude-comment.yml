name: Claude (comment)

# Interactive agent for @claude mentions in issues and PRs.
# Comment `@claude <instruction>` and Claude responds — checking out the repo,
# implementing the change, running the definition-of-done checks, and opening a PR.
#
# No `prompt` is set here intentionally: setting `prompt` on claude-code-action
# switches it to "automation mode", which ignores the triggering comment body and
# uses the hardcoded prompt as the task instead. For interactive comment handling,
# the comment body must reach Claude directly. Standing instructions (CLAUDE.md,
# Parity Rulebook, subagent delegation) are read from the checkout automatically.
#
# Queue-based dispatch for `agent-ready` issues lives in dispatch-agent.yml.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # Trust gate: only the owner / org members can trigger the agent. COLLABORATOR
    # is deliberately excluded — that association doesn't guarantee write access
    # (a read/triage-only collaborator would still match). On a public repo this
    # is essential: otherwise a stranger's comment could prompt-inject the agent,
    # which runs with secrets + a write token.
    if: >
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
      ) &&
      contains(fromJSON('["OWNER","MEMBER"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # @claude may implement code and run the definition-of-done checks, so give
      # it the Flutter/Dart SDK on the runner.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Auth via a Claude Pro/Max subscription. Generate the token locally
          # with `claude setup-token` and store it as the CLAUDE_CODE_OAUTH_TOKEN
          # secret. (Swap to `anthropic_api_key` for pay-as-you-go API billing.)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Auto mode: ephemeral CI runner, so let the agent run its tools
          # (git, gh, flutter, dart) without per-command allowlisting.
          claude_args: '--permission-mode bypassPermissions --disallowedTools "ScheduleWakeup"'
          allowed_bots: "github-actions[bot],claude[bot],controlol-auth[bot]"

