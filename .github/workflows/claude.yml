name: Claude

# Interactive agent for @claude mentions: comment `@claude <instruction>` on any
# issue or PR and Claude responds — implementing against CLAUDE.md + the Parity
# Rulebook and opening a PR. CI (ci.yml) then gates it, and claude-review.yml
# reviews the diff.
#
# Ordered queue dispatch (the `agent-ready` label) lives in dispatch-agent.yml,
# which respects issue dependencies and a concurrency cap. Labelling an issue
# `agent-ready` no longer fires this workflow.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Only react to human @claude mentions.
jobs:
  claude:
    # Trust gate: only the owner / org members / repo collaborators can trigger
    # the agent. On a public repo this is essential — without it any stranger's
    # comment could prompt-inject the agent, which runs with secrets + a write token.
    if: >
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
      ) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # @claude may implement code and run the definition-of-done checks, so give
      # it the Flutter/Dart SDK on the runner.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Auth via a Claude Pro/Max subscription. Generate the token locally
          # with `claude setup-token` and store it as the CLAUDE_CODE_OAUTH_TOKEN
          # secret. (Swap to `anthropic_api_key` for pay-as-you-go API billing.)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Auto mode: ephemeral CI runner, so let the agent run its tools
          # (git, gh, flutter, dart) without per-command allowlisting.
          claude_args: "--permission-mode bypassPermissions"
          prompt: |
            Follow CLAUDE.md and the Parity Rulebook in
            engineering/decisions/design-system.md.

            Delegate to the project subagents (.claude/agents/):
            - Use the `test-author` subagent to write/maintain any `core` tests,
              with expected values traced to the design docs.
            - Use the `spec-auditor` subagent to check the change against the
              Parity Rulebook and Phase-1 constraints before opening the PR.

            Before opening a PR, run the definition-of-done checks and make them
            pass. Do not open a PR with failing checks or unresolved spec-auditor
            findings.
