name: Agent dispatcher

# Ordered, dependency-aware queue for agent work.
#
# Why this exists: it runs the next *unblocked* `agent-ready` issue, claims it,
# and runs Claude on it — at most MAX_IN_FLIGHT agent PRs in flight at a time.
# It is triggered event-driven (so pickup is near-instant), not just on a poll:
#   - `issues: labeled`        — a human adds `agent-ready` (queues work)
#   - `pull_request: closed`   — a merged PR frees a queue slot
#   - `schedule` (low-freq)    — a backstop, since GitHub throttles short crons
#   - `workflow_dispatch`      — manual / specific-issue dispatch
# (See `select.if` for the per-trigger guards.)
#
# "Unblocked" is decided from two sources (an issue is blocked if EITHER says so):
#   1. GitHub's native issue dependencies — the "Blocked by" relationships,
#      read via the REST API (`/issues/{n}/dependencies/blocked_by`).
#   2. A text fallback: `Blocked by #N` / `Depends on #N` in the issue body.
# An issue is ready only when every issue it depends on is CLOSED (i.e. merged).
# That is the ordering guarantee: nothing starts before its prerequisites land.
#
# The claim is an `agent-working` label. Because the dispatcher runs Claude
# inline (rather than re-triggering claude.yml via a label), it sidesteps the
# rule that GITHUB_TOKEN-driven label events don't start new workflow runs.
#
# Interactive `@claude` mentions stay in claude-comment.yml and are unaffected.

on:
  # Event-driven dispatch: pick up work the moment it appears or a slot frees,
  # instead of relying on GitHub's throttled sub-hourly cron.
  issues:
    types: [labeled]            # a human adding `agent-ready` queues work
  pull_request:
    types: [closed]             # a merged PR frees a queue slot (guarded in select.if)
  schedule:
    - cron: "7,37 * * * *"      # low-frequency backstop on off-peak minutes;
                                # GitHub heavily throttles top-of-hour schedules
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number to dispatch right now (skips the queue and the block check). Leave blank to auto-pick the next ready issue."
        required: false
        type: string

# Serialize dispatcher runs so two ticks can never claim the same issue.
concurrency:
  group: agent-dispatch
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  READY_LABEL: agent-ready       # "queued for the agent"
  WORKING_LABEL: agent-working   # "agent currently running" (claim; swapped to PR_LABEL on success)
  PR_LABEL: agent-pr-open        # "PR open, awaiting review" (counts toward the cap)
  NO_PR_LABEL: agent-no-pr       # agent run finished but opened no PR; needs human triage before re-queuing
  MAX_IN_FLIGHT: "1"             # how many agent PRs may be open at once

jobs:
  select:
    name: Pick next ready issue
    # Only act on relevant triggers: the cron/manual backstop, a human adding the
    # agent-ready label, or one of our own (same-repo) PRs merging (frees a slot).
    # Labels added by the dispatcher's own token don't re-trigger workflows.
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'agent-ready') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    outputs:
      issue: ${{ steps.pick.outputs.issue }}
    steps:
      - id: pick
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MANUAL_ISSUE: ${{ github.event.inputs.issue }}
        run: |
          set -euo pipefail

          # --- Manual override: dispatch a specific issue, bypassing the queue ---
          if [ -n "${MANUAL_ISSUE:-}" ]; then
            echo "Manual dispatch requested for #$MANUAL_ISSUE (block check skipped)."
            gh issue edit "$MANUAL_ISSUE" --repo "$REPO" --add-label "$WORKING_LABEL" || true
            echo "issue=$MANUAL_ISSUE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --- Concurrency cap: how many agent slots are occupied? ---
          # Two labels cover the full lifecycle of a slot:
          #   agent-working  — agent is currently running (claimed, no PR yet)
          #   agent-pr-open  — agent finished; PR is open awaiting review
          # Both count toward the cap. agent-working is swapped to agent-pr-open
          # on success; agent-pr-open disappears when the issue closes on PR merge.
          running=$(gh issue list --repo "$REPO" --state open --label "$WORKING_LABEL" \
            --limit 200 --json number --jq 'length')
          pr_open=$(gh issue list --repo "$REPO" --state open --label "$PR_LABEL" \
            --limit 200 --json number --jq 'length')
          in_flight=$((running + pr_open))
          echo "In flight: $in_flight (running=$running, pr-open=$pr_open, cap $MAX_IN_FLIGHT)"
          if [ "$in_flight" -ge "$MAX_IN_FLIGHT" ]; then
            echo "At capacity; nothing to dispatch this tick."
            echo "issue=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --- Candidate queue: open, agent-ready, not already claimed, lowest # first ---
          # Excludes issues carrying a slot label (running or PR open) or flagged
          # as needing human triage after a run that opened no PR.
          candidates=$(gh issue list --repo "$REPO" --state open --label "$READY_LABEL" \
            --limit 200 --json number,labels,body \
            --jq '[ .[] | select( any(.labels[]; .name == env.WORKING_LABEL or .name == env.PR_LABEL or .name == env.NO_PR_LABEL) | not ) ] | sort_by(.number)')
          echo "Candidate ready issues: $(echo "$candidates" | jq 'length')"

          picked=""
          for i in $(echo "$candidates" | jq -r '.[].number'); do
            echo "::group::Evaluating #$i"
            blocked=0

            # 1) Native "Blocked by" dependencies. The endpoint 404s if the feature
            #    is unavailable on the repo; treat any error as "no native blockers".
            if open_blockers=$(gh api "repos/$REPO/issues/$i/dependencies/blocked_by" \
                  --jq '[ .[] | select(.state != "closed") ] | length' 2>/dev/null); then
              if [ "${open_blockers:-0}" -gt 0 ]; then
                echo "#$i: $open_blockers open native blocker(s)"
                blocked=1
              fi
            fi

            # 2) Text fallback: "Blocked by #N" / "Depends on #N" in the body.
            if [ "$blocked" -eq 0 ]; then
              body=$(echo "$candidates" | jq -r ".[] | select(.number==$i) | .body // \"\"")
              refs=$(printf '%s' "$body" \
                | grep -ioE '(blocked by|depends on)[ :]*#?[0-9][0-9, #&and]*' \
                | grep -oE '[0-9]+' | sort -u || true)
              for dep in $refs; do
                st=$(gh issue view "$dep" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "")
                if [ "$st" = "OPEN" ]; then
                  echo "#$i: blocked by open #$dep (text reference)"
                  blocked=1
                  break
                fi
              done
            fi

            if [ "$blocked" -eq 0 ]; then
              echo "#$i is READY"
              picked="$i"
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
          done

          if [ -z "$picked" ]; then
            echo "No unblocked issue to dispatch."
            echo "issue=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Claim it so the next tick (and the cap) account for it.
          gh issue edit "$picked" --repo "$REPO" --add-label "$WORKING_LABEL"
          echo "Dispatching #$picked"
          echo "issue=$picked" >> "$GITHUB_OUTPUT"

  implement:
    name: Implement issue
    needs: select
    if: needs.select.outputs.issue != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main          # always branch from the default branch, not a PR merge ref

      # The agent runs the definition-of-done checks (flutter/dart), so it needs
      # the SDK on the runner.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: stable
          cache: true

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Same subscription auth as claude.yml (see docs/agentic-workflow.md).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Auto mode: this is an ephemeral CI runner, so let the agent run its
          # tools (git, gh, flutter, dart) without per-command allowlisting.
          claude_args: "--permission-mode bypassPermissions"
          show_full_output: "true"
          prompt: |
            You are implementing GitHub issue #${{ needs.select.outputs.issue }}
            in repository ${{ github.repository }}.

            Start by reading the issue and its acceptance criteria:
              gh issue view ${{ needs.select.outputs.issue }}

            Follow CLAUDE.md and the Parity Rulebook in
            engineering/decisions/design-system.md.

            Delegate to the project subagents (.claude/agents/):
            - Use the `test-author` subagent to write/maintain any `core` tests,
              with expected values traced to the design docs.
            - Use the `spec-auditor` subagent to check the change against the
              Parity Rulebook and Phase-1 constraints before opening the PR.

            Create a branch named `claude/issue-${{ needs.select.outputs.issue }}`
            (you may append a short slug, e.g. `claude/issue-5-bac-widget`).
            Implement the change and run the definition-of-done checks until they
            pass. Then open a pull request whose description includes
            "Closes #${{ needs.select.outputs.issue }}" — merging the PR then
            closes the issue and frees its queue slot for the next one.

            Do not open a PR with failing checks or unresolved spec-auditor findings.

            Before you finish, leave exactly one comment on the issue
            (`gh issue comment ${{ needs.select.outputs.issue }}`) reporting the
            outcome:
            - If you opened a PR: state the PR number/link and a one-line
              summary of what it does.
            - If you did NOT open a PR: say so explicitly and explain why in
              concrete terms (e.g. already covered by a prior merged PR,
              genuinely blocked on something the queue didn't catch, or
              checks won't pass without a human decision) so a maintainer can
              decide whether to close the issue, unblock it, or re-queue it.
            Never end the run without opening a PR or leaving this comment —
            a silent exit leaves the queue unable to tell success from a
            no-op.

      # The Claude Code step exiting 0 only means the SDK session didn't crash —
      # it does NOT mean a PR was opened (the agent may have concluded no change
      # was needed, hit a wall, or otherwise stopped short). Check for a matching
      # PR before deciding which outcome this was.
      - name: Promote claim on success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ needs.select.outputs.issue }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          # Defense-in-depth: ISSUE ultimately traces back to the
          # workflow_dispatch free-text `issue` input on the manual-dispatch
          # path, unvalidated elsewhere. It's concatenated into a jq regex
          # below, so a non-numeric value could widen that match unexpectedly
          # (e.g. embedded regex metacharacters) rather than just failing to
          # find a PR.
          if ! [[ "$ISSUE" =~ ^[0-9]+$ ]]; then
            echo "::error::ISSUE '$ISSUE' is not a valid issue number; refusing to proceed."
            exit 1
          fi

          # Ensure labels exist (idempotent; ignore error if already present).
          gh label create "$PR_LABEL" --repo "$REPO" \
            --color "#0052cc" --description "Agent PR open, awaiting review" 2>/dev/null || true
          gh label create "agent-ok" --repo "$REPO" \
            --color "#e4e669" --description "Greenlit for automated review" 2>/dev/null || true
          gh label create "$NO_PR_LABEL" --repo "$REPO" \
            --color "#b60205" --description "Agent run finished without opening a PR; needs human triage" 2>/dev/null || true

          # Find the PR the agent opened for this issue, if any. Match on the
          # branch naming convention (exact `claude/issue-N` or `claude/issue-N-*`
          # — a bare startswith would also match issue-17 against issue-1) OR a
          # "Closes #N" reference in the body, since the agent isn't guaranteed
          # to have followed the branch-naming convention exactly.
          #
          # SECURITY: also require the PR be authored by the dispatcher's own
          # bot (app/claude — the same actor review-remediation.yml already
          # trusts). Without this, the body-text match alone would let ANY
          # open PR — including an untrusted fork PR an attacker opens with
          # "Closes #N" in the body — get `agent-ok` auto-applied below, which
          # is the trust gate ci.yml's review/security jobs use to decide
          # whether to run the secret-bearing Claude Code Action against a
          # PR's (fully attacker-controlled, for a fork) diff/description.
          #
          # NOTE: `gh ... --jq` takes exactly one expression argument — it
          # does NOT support a leading `--arg name value` pair the way the
          # standalone `jq` binary does. Pipe to real `jq` instead so --arg
          # actually works.
          pr_number=$(gh pr list --repo "$REPO" --state open --limit 100 \
              --json number,headRefName,body,author \
            | jq -r --arg issue "$ISSUE" \
              '.[] | select(
                  (.author.login == "app/claude") and (
                    (.headRefName == ("claude/issue-" + $issue)) or
                    (.headRefName | startswith("claude/issue-" + $issue + "-")) or
                    ((.body // "") | test("\\b(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\\s+#" + $issue + "\\b"; "i"))
                  )
                ) | .number' \
            | head -1)

          if [ -n "$pr_number" ]; then
            # Swap issue label: agent-working → agent-pr-open, and greenlight
            # the PR for the automated review workflow.
            gh issue edit "$ISSUE" --repo "$REPO" \
              --add-label "$PR_LABEL" --remove-label "$WORKING_LABEL" \
              --remove-label "$NO_PR_LABEL" || true
            gh pr edit "$pr_number" --repo "$REPO" --add-label "agent-ok" || true
            # Guaranteed mechanical note, independent of whether the agent
            # followed the prompt's "leave a comment" instruction.
            gh issue comment "$ISSUE" --repo "$REPO" --body \
              "Agent opened #$pr_number for this issue (run $RUN_URL)." || true
          else
            # No matching PR: release the claim instead of leaving the issue
            # falsely marked agent-pr-open (which would wedge the in-flight cap
            # forever, since nothing will ever merge). Flag it for a human
            # instead of silently re-queuing, since the agent may have reached
            # this outcome deliberately (e.g. issue already covered by prior
            # work) and would likely reach it again on retry.
            gh issue edit "$ISSUE" --repo "$REPO" \
              --add-label "$NO_PR_LABEL" --remove-label "$WORKING_LABEL" || true
            gh issue comment "$ISSUE" --repo "$REPO" --body \
              "Agent run finished (run $RUN_URL) without opening a pull request. Added \`$NO_PR_LABEL\` and released \`$WORKING_LABEL\` so this issue no longer silently occupies the in-flight slot. Check the agent's comment above for its reasoning — the run log won't show it (output is hidden by the action), so a missing comment here is itself worth flagging as a prompt-compliance gap. Then either close this issue, fix the blocker, or remove \`$NO_PR_LABEL\` to let the dispatcher retry it." || true
          fi

      # If the run failed before a PR was opened, release the claim so the issue
      # re-queues on the next tick instead of stalling the whole queue.
      - name: Release claim on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ needs.select.outputs.issue }}
        run: |
          set -euo pipefail
          gh issue edit "$ISSUE" --repo "$REPO" --remove-label "$WORKING_LABEL" || true
          gh issue comment "$ISSUE" --repo "$REPO" --body \
            "Agent dispatch failed (run ${{ github.run_id }}). Removed \`$WORKING_LABEL\` so it will be retried on the next tick. If a partial PR was opened, close it first." || true
