name: Security Review

# AI-powered security scan of PR diffs (anthropics/claude-code-security-review).
# Flags injection, secret leakage, unsafe persistence/serialisation, etc.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  security:
    # Trust gate (see claude-review.yml): only auto-run on PRs from the owner or
    # the pipeline's own claude/* branches; any other PR must be greenlit by a
    # maintainer adding the `agent-ok` label.
    if: >
      github.event.pull_request.draft == false && (
        github.event.pull_request.author_association == 'OWNER' ||
        (github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.head.ref, 'claude/')) ||
        (github.event.action == 'labeled' && github.event.label.name == 'agent-ok') ||
        contains(github.event.pull_request.labels.*.name, 'agent-ok')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Claude security review
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          comment-pr: true
