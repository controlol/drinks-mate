include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  exclude:
    - "**/*.g.dart"      # Drift / generated code
    - "**/*.freezed.dart"
    - "packages/core/test/**"  # Tested separately by `dart test` in the core job; package:test is unavailable here

linter:
  rules:
    - prefer_const_constructors
    - prefer_final_locals
    - avoid_print
