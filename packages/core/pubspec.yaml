name: core
description: >-
  Dependency-free pure-Dart computation core for Drinks Mate (BAC, hydration
  goal, pace/recommended-volume, username validation). One implementation, so
  iOS/Android parity holds by construction. See engineering/decisions/flutter-stack.md (D7)
  and the Parity Rulebook in engineering/decisions/design-system.md.
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

# Deliberately NO dependencies. The core package must stay pure Dart with no
# Flutter/Drift imports so it is trivially unit-testable and reusable by the
# notification scheduler, icon tinting, Party tab, and History.
dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
